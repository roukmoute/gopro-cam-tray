[package]
name = "gopro-cam-tray"
version = "0.1.3"
edition = "2021"
description = "Tiny native tray app that turns a GoPro into a webcam via the OBS Virtual Camera"
license = "MIT"
readme = "README.md"

[dependencies]
ureq = { version = "2", default-features = false }
if-addrs = "0.13"
windows = { version = "0.58", features = [
    "Win32_Foundation",
    "Win32_Security",
    "Win32_System_Com",
    "Win32_System_LibraryLoader",
    "Win32_System_Threading",
    "Win32_Media_MediaFoundation",
    "Win32_Networking_WinSock",
    "Win32_Graphics_Gdi",
    "Win32_UI_Shell",
    "Win32_UI_WindowsAndMessaging",
] }

[build-dependencies]
# Embeds the app icon into the .exe (Explorer/taskbar icon + resource for the tray).
winresource = "0.1"

# Smallest possible release binary.
[profile.release]
opt-level = "z"
lto = true
codegen-units = 1
panic = "abort"
strip = true
