name: build

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v5
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Test
        run: cargo test --locked
      - name: Build (release)
        run: cargo build --release --locked
      - name: Upload binary
        uses: actions/upload-artifact@v7
        with:
          name: gopro-cam-tray-windows
          path: target/release/gopro-cam-tray.exe

  build-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-unknown-linux-musl
      - uses: Swatinem/rust-cache@v2
      # Static musl build => a single binary that runs on any Linux distro,
      # independent of the system glibc version.
      - name: Install musl tools
        run: sudo apt-get update && sudo apt-get install -y musl-tools
      - name: Build (release, static musl)
        run: cargo build --release --locked --target x86_64-unknown-linux-musl
      - name: Upload binary
        uses: actions/upload-artifact@v7
        with:
          name: gopro-cam-tray-linux
          path: target/x86_64-unknown-linux-musl/release/gopro-cam-tray

  release:
    # On push to main, cut a release when Cargo.toml's version has no tag yet.
    if: github.ref == 'refs/heads/main'
    needs: [build-windows, build-linux]
    runs-on: windows-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v5

      - name: Read version from Cargo.toml
        id: ver
        shell: bash
        run: echo "version=$(grep -m1 '^version' Cargo.toml | sed -E 's/.*"(.*)".*/\1/')" >> "$GITHUB_OUTPUT"

      - name: Check whether this release already exists
        id: check
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          if gh release view "v${{ steps.ver.outputs.version }}" >/dev/null 2>&1; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Download build artifacts
        if: steps.check.outputs.exists == 'false'
        uses: actions/download-artifact@v7
        with:
          path: artifacts

      - name: Create tag and release
        if: steps.check.outputs.exists == 'false'
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: >
          gh release create "v${{ steps.ver.outputs.version }}"
          "artifacts/gopro-cam-tray-windows/gopro-cam-tray.exe"
          "artifacts/gopro-cam-tray-linux/gopro-cam-tray"
          --title "v${{ steps.ver.outputs.version }}"
          --target "${{ github.sha }}"
          --generate-notes
