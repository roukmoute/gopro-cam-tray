name: build

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v5
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Build (release)
        run: cargo build --release --locked
      - name: Upload binary
        uses: actions/upload-artifact@v7
        with:
          name: gopro-cam-tray
          path: target/release/gopro-cam-tray.exe

  release:
    # On push to main, cut a release when Cargo.toml's version has no tag yet.
    if: github.ref == 'refs/heads/main'
    needs: build
    runs-on: windows-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v5

      - name: Read version from Cargo.toml
        id: ver
        shell: bash
        run: echo "version=$(grep -m1 '^version' Cargo.toml | sed -E 's/.*"(.*)".*/\1/')" >> "$GITHUB_OUTPUT"

      - name: Check whether this release already exists
        id: check
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          if gh release view "v${{ steps.ver.outputs.version }}" >/dev/null 2>&1; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi

      - uses: dtolnay/rust-toolchain@stable
        if: steps.check.outputs.exists == 'false'
      - uses: Swatinem/rust-cache@v2
        if: steps.check.outputs.exists == 'false'
      - name: Build (release)
        if: steps.check.outputs.exists == 'false'
        run: cargo build --release --locked

      - name: Create tag and release
        if: steps.check.outputs.exists == 'false'
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: >
          gh release create "v${{ steps.ver.outputs.version }}"
          "target/release/gopro-cam-tray.exe"
          --title "v${{ steps.ver.outputs.version }}"
          --target "${{ github.sha }}"
          --generate-notes
